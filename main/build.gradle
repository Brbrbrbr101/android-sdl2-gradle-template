buildscript {
    repositories {
        // Modern "stores" to find the build tools
        google()
        mavenCentral()
        jcenter() 
    }
    dependencies {
        // The tool required to read the 'model' block below
        classpath 'com.android.tools.build:gradle-experimental:0.8.0-rc2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        jcenter()
    }
}

// --- YOUR GAME LOGIC STARTS HERE ---
apply plugin: 'com.android.model.native'

def lib_distribution_root = '../distribution'

model {
    repositories {
        libs(PrebuiltLibraries) {
            SDL2 {
                headers.srcDir "../SDL2/include"
                binaries.withType(SharedLibraryBinary) {
                    sharedLibraryFile = file("${lib_distribution_root}/SDL2/lib/${targetPlatform.getName()}/libSDL2.so")
                }
            }
        }
    }

    android {
        compileSdkVersion = 24
        buildToolsVersion = '23.0.3'

        defaultConfig {
            minSdkVersion.apiLevel = 13
            targetSdkVersion.apiLevel = 24
            versionCode = 1
            versionName = '1.0'
        }
        
        ndk {
            moduleName = 'main'
            cppFlags.addAll(["-I" + file("../SDL2/include/").absolutePath])
            CFlags.addAll(["-I" + file("../SDL2/include/").absolutePath])
            stl "stlport_static"
        }

        sources {
            main {
                jni {
                    dependencies {
                        library 'SDL2' linkage 'shared'
                    }
                    source {
                        srcDirs 'src/'
                        srcDirs '../SDL2/src/main/android/'
                    }
                }
            }
        }
    }
}

// Task to move the built library to the distribution folder
task(distributeLib, type : Copy) {
    dependsOn assemble
    into '../distribution/main/'
    from('build/outputs/native/release/lib') {
        into 'lib/'
    }
}
