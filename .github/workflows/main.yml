name: Build Game
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Setup Java 17 (The Modern Standard)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3. FORCE GRADLE 8.5 (This is the "Exorcist" step)
      # This downloads a modern Gradle that knows how to talk to Java 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # 4. The Build Command
      # NOTE: We use 'gradle' NOT './gradlew' here. 
      # Using 'gradle' uses the version we just downloaded (8.5).
      # Using './gradlew' would use your old broken file and crash again.
      - name: Build with Gradle
        run: |
          gradle assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-APK
          path: "app/build/outputs/apk/debug/*.apk"
