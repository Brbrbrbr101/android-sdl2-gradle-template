name: Build Game
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find and Build
        run: |
          # Find gradlew and move to its folder
          SET_PATH=$(find . -name gradlew -print -quit)
          cd $(dirname $SET_PATH)
          chmod +x gradlew
          # Added flags to ignore the version errors that stopped us earlier
          export SKIP_JDK_VERSION_CHECK=true
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-APK
          path: "**/*.apk"
